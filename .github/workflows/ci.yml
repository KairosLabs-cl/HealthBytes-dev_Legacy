name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [master, main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_call: # allows deploy.yml to call this as a CI gate

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black isort flake8 bandit

      - name: Black (formatting)
        run: black --check --line-length 100 app/

      - name: isort (import sorting)
        run: isort --check-only --profile black app/

      - name: Flake8 (linting)
        run: flake8 app/ --max-line-length 100 --extend-ignore E203,W503

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov aiosqlite

      - name: Create test .env
        run: |
          echo "***REDACTED_DATABASE_URL***
          echo "JWT_SECRET=ci-test-secret-key-min-32-characters-long" >> .env

      - name: Run tests
        run: pytest --tb=short --cov=app --cov-fail-under=80 -q

  frontend-lint:
    name: Frontend Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm type-check

      - name: ESLint
        run: pnpm lint

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm exec jest --ci --forceExit

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t healthbytes-backend ./backend

      - name: Build frontend image
        run: docker build -t healthbytes-frontend ./frontend
