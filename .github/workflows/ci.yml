name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: ['**']
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [master, main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_call: # allows deploy.yml to call this as a CI gate

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black==25.1.0 isort flake8 bandit

      - name: Black (formatting)
        run: black --check --line-length 100 app/

      - name: isort (import sorting)
        run: isort --check-only --profile black app/

      - name: Flake8 (linting)
        run: flake8 app/ --max-line-length 100 --extend-ignore E203,W503

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov aiosqlite

      - name: Create test .env
        run: |
          echo "DATABASE_URL=sqlite+aiosqlite:///:memory:" > .env
          echo "JWT_SECRET=ci-test-secret-key-min-32-characters-long" >> .env

      - name: Run tests
        run: pytest --tb=short --cov=app --cov-fail-under=80 -q

      - name: Audit Python dependencies
        run: |
          pip install safety
          safety check -r requirements.txt --continue-on-error
        continue-on-error: true

  frontend-lint:
    name: Frontend Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm type-check

      - name: ESLint
        run: pnpm lint

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm exec jest --ci --forceExit

  frontend-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        working-directory: frontend
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Gitleaks
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install bandit
      - run: bandit -r app/ -ll  # Only high/medium severity

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t healthbytes-backend ./backend

      - name: Build frontend image
        run: docker build -t healthbytes-frontend ./frontend

  # ==========================================================================
  # PRODUCTION DEPLOYMENT (Manual Approval Gate)
  # ==========================================================================
  # The manual approval is configured in GitHub UI, NOT in this file:
  #   GitHub Settings → Environments → "production" → Required reviewers
  # Add at least one reviewer there to enforce a manual approval step before
  # this job runs. Without that configuration, the job will run automatically.
  # ==========================================================================
  deploy-production:
    name: Deploy to Production
    needs: [backend-test, frontend-test, sast, secret-scan, docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.healthbytes.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "Production deployment approved."
          echo "Configure EAS Build (mobile) or ECS deploy (backend) here."
          echo "See docs/architecture/ for deployment strategy."
