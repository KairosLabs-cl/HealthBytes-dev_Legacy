## HealthBytes — docsync configuration
## Defines which files get updated, what metrics to track, and how to generate the CHANGELOG.

project:
  name: HealthBytes
  repo: nojustbenja/HealthBytes-dev

# ─────────────────────────────────────────
# METRICS — extracted from live repo/runtime
# ─────────────────────────────────────────
metrics:
  # Tier 1 — fast, no test execution needed
  python_version:
    cmd: "python --version"
    regex: "Python (\\S+)"

  node_version:
    cmd: "node --version"
    regex: "v(\\S+)"

  pnpm_version:
    cmd: "pnpm --version"
    regex: "(\\S+)"

  fastapi_version:
    cmd: "python -c \"import fastapi; print(fastapi.__version__)\""
    regex: "(\\S+)"
    workdir: backend

  sqlalchemy_version:
    cmd: "python -c \"import sqlalchemy; print(sqlalchemy.__version__)\""
    regex: "(\\S+)"
    workdir: backend

  pydantic_version:
    cmd: "python -c \"import pydantic; print(pydantic.__version__)\""
    regex: "(\\S+)"
    workdir: backend

  expo_version:
    source: frontend/package.json
    json_key: "dependencies.expo"

  react_native_version:
    source: frontend/package.json
    json_key: "dependencies.react-native"

  zustand_version:
    source: frontend/package.json
    json_key: "dependencies.zustand"

  # Tier 1 — test counts (collect-only, fast)
  backend_tests_collected:
    cmd: "python -m pytest --tb=no -q --co -q"
    regex: "(\\d+) tests? collected"
    workdir: backend

  backend_coverage:
    cmd: "python -m pytest --tb=no -q --co -q --cov=app --cov-report=term"
    regex: "TOTAL\\s+\\d+\\s+\\d+\\s+(\\d+)%"
    workdir: backend

  frontend_tests_passed:
    cmd: "pnpm test --watchAll=false"
    regex: "Tests:\\s+(\\d+) passed"
    workdir: frontend

  frontend_suites_passed:
    cmd: "pnpm test --watchAll=false"
    regex: "Test Suites:\\s+(\\d+) passed"
    workdir: frontend

  frontend_tests_total:
    cmd: "pnpm test --watchAll=false"
    regex: "Tests:\\s+\\d+ passed.*?(\\d+) total"
    workdir: frontend

  # Tier 2 — static analysis (fast)
  api_endpoints_count:
    scan_dir: backend/app/api/v1
    scan_pattern: "@router\\.(get|post|put|patch|delete)\\("
    type: count_matches

  e2e_tests_count:
    scan_dir: backend/tests/e2e
    scan_pattern: "^def test_|^async def test_"
    type: count_matches

  smoke_checks_count:
    scan_file: backend/scripts/smoke_tests.py
    scan_pattern: "\\(f\"{base}"
    type: count_matches

  todos_count:
    scan_dir: backend/app
    scan_pattern: "#\\s*TODO"
    type: count_matches

  alembic_migrations_count:
    scan_dir: backend/alembic/versions
    scan_pattern: "\\.py$"
    type: count_files

  # Tier 3 — git-based (for changelog)
  commits_last_7d:
    cmd: "git log --oneline --since=\"7 days ago\""
    type: count_lines

  feat_commits_since_last_tag:
    cmd: "git log --oneline $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD"
    regex_filter: "^\\w+ feat"
    type: count_lines

  fix_commits_since_last_tag:
    cmd: "git log --oneline $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD"
    regex_filter: "^\\w+ fix"
    type: count_lines

# ─────────────────────────────────────────
# FILES — which docs to update and how
# ─────────────────────────────────────────
files:
  - path: README.md
    updates:
      - section_marker: "<!-- DOCSYNC:status-table -->"
        template: status_table

      - section_marker: "<!-- DOCSYNC:testing-table -->"
        template: testing_table

      - section_marker: "<!-- DOCSYNC:stack-backend -->"
        template: stack_backend

      - section_marker: "<!-- DOCSYNC:last-updated -->"
        template: last_updated

  - path: backend/AI-README.md
    updates:
      - section_marker: "<!-- DOCSYNC:backend-stack -->"
        template: stack_backend_ai

      - section_marker: "<!-- DOCSYNC:test-status -->"
        template: test_status_backend

  - path: frontend/AI-README.md
    updates:
      - section_marker: "<!-- DOCSYNC:frontend-stack -->"
        template: stack_frontend_ai

      - section_marker: "<!-- DOCSYNC:test-status -->"
        template: test_status_frontend

  - path: CHANGELOG.md
    updates:
      - section_marker: "<!-- DOCSYNC:changelog-body -->"
        template: changelog_entry
        prepend: true   # new entries go at the top

# ─────────────────────────────────────────
# FEATURES — known file signatures to detect
# ─────────────────────────────────────────
features:
  - name: Redis Cache
    check_file: backend/app/services/product_service.py
    check_pattern: "get_products_cached"

  - name: OnboardingModal
    check_file: frontend/app/_layout.tsx
    check_pattern: "OnboardingModal"

  - name: E2E Tests
    check_dir: backend/tests/e2e
    min_files: 1

  - name: Rate Limiting
    check_file: backend/app/main.py
    check_pattern: "slowapi|Limiter"

  - name: Sentry
    check_file: backend/app/main.py
    check_pattern: "sentry_sdk.init"

  - name: MercadoPago
    check_file: backend/app/services/mercadopago_service.py
    check_pattern: "mercadopago"

  - name: Email (Resend)
    check_file: backend/app/services/email_service.py
    check_pattern: "resend|Resend"

  - name: Stock Locking
    check_file: backend/app/services/stock_service.py
    check_pattern: "with_for_update|select_for_update"

# ─────────────────────────────────────────
# VALIDATION — thresholds that must hold
# ─────────────────────────────────────────
validation:
  backend_tests_min: 400
  frontend_tests_min: 100
  api_endpoints_min: 40
  # coverage check is skipped in --validate mode (too slow for pre-commit)
