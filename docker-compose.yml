services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: healthbytes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-healthbytes}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-healthbytes}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Tools/backend/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-healthbytes}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthbytes_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthbytes-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-healthbytes}:${DB_PASSWORD:?Set DB_PASSWORD in .env}@postgres:5432/${DB_NAME:-healthbytes}
      JWT_SECRET: ${JWT_SECRET}  # Set in .env file - never hardcode
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
    ports:
      - "3001:3001"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - healthbytes_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React Native / Expo Frontend (Dev)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthbytes-frontend
    restart: unless-stopped
    environment:
      EXPO_PUBLIC_API_URL: http://backend:3001
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY:-${CLERK_PUBLISHABLE_KEY}}
      NODE_ENV: development
    ports:
      - "8081:8081"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/api:/app/api
      - ./frontend/store:/app/store
      - ./frontend/types:/app/types
      - ./frontend/lib:/app/lib
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - healthbytes_network
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: healthbytes-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    networks:
      - healthbytes_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local

networks:
  healthbytes_network:
    driver: bridge
